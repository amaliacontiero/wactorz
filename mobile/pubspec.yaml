name: wactorz
description: "Wactorz mobile companion app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0a0a14"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
