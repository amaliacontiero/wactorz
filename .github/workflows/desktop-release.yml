name: Desktop Release

# Builds Tauri desktop bundles for macOS, Windows, and Linux.
#
# Triggers:
#   - Push of a v*.*.* tag  → builds all platforms and creates a draft GitHub Release
#   - workflow_dispatch      → builds all platforms and uploads artifacts (14-day retention)
#
# No code signing is configured; macOS users will need to right-click → Open on first launch
# until the app is notarised.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# tauri-action needs to create/update the (draft) GitHub Release and upload
# bundle assets to it — the default GITHUB_TOKEN is read-only without this.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
            rust_targets: ''

          # Native Arm64 runner — avoids cross-compiling glib/webkit2gtk
          # (pkg-config refuses to link host-arch GTK libs into an aarch64
          # binary; setting up a proper aarch64 sysroot is fragile, this
          # mirrors the windows-11-arm native-build approach instead).
          - platform: ubuntu-24.04-arm
            args: ''
            rust_targets: ''

          - platform: windows-latest
            args: ''
            rust_targets: ''

          - platform: windows-11-arm
            args: ''
            rust_targets: ''

          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-24.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}
          # Tag releases only — leave empty on manual dispatch to skip release creation
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Wactorz Desktop {0}', github.ref_name) || '' }}
          releaseBody: |
            ## Install

            | Platform | Download |
            |---|---|
            | **macOS** (Apple Silicon + Intel) | `.dmg` |
            | **Windows** (x64) | `.msi` |
            | **Windows** (ARM64) | `.msi` |
            | **Linux** (x64) | `.AppImage`, `.deb` |
            | **Linux** (ARM64) | `.AppImage`, `.deb` |

            **macOS:** if Gatekeeper blocks the app, right-click → **Open** on first launch (unsigned build).
            **Linux (.AppImage):** `chmod +x Wactorz_*.AppImage && ./Wactorz_*.AppImage`

            See [CHANGELOG.md](https://github.com/waldiez/wactorz/blob/main/CHANGELOG.md) for what's new.
          releaseDraft: true
          prerelease: false

      # tauri-action knows exactly where it put the files — use its output directly.
      # The artifactPaths output is a JSON array; parse and upload each path.
      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: wactorz-desktop-${{ matrix.platform }}
          # Cover both workspace-root target/ and frontend/src-tauri/target/
          path: |
            target/**/bundle/**/*.dmg
            target/**/bundle/**/*.msi
            target/**/bundle/**/*.exe
            target/**/bundle/**/*.AppImage
            target/**/bundle/**/*.deb
            frontend/src-tauri/target/**/bundle/**/*.dmg
            frontend/src-tauri/target/**/bundle/**/*.msi
            frontend/src-tauri/target/**/bundle/**/*.exe
            frontend/src-tauri/target/**/bundle/**/*.AppImage
            frontend/src-tauri/target/**/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 14
