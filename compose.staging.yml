services:

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./staging/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  monitor:
    build: .
    command: wactorz-monitor
    restart: unless-stopped
    env_file: staging/.env.staging
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_WS_PORT: "9001"
    depends_on:
      - mosquitto
    # Exposed on localhost only — Caddy reverse-proxies externally
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - wactorz-state:/app/state

volumes:
  mosquitto-data:
  wactorz-state:
