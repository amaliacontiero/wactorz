extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # Exposes /metrics for Prometheus to scrape — preserves pull model.
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: wactorz
    send_timestamps: true
    enable_open_metrics: true

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
